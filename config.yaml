# A股量化交易系统配置

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"  # debug / release

database:
  type: "sqlite"
  name: "data/aqsystem.db"

log:
  level: "info"
  format: "console"
  path: "logs/aqsystem.log"

broker:
  id: "sim_broker_01"
  name: "模拟券商"
  type: "simulated"  # simulated / xtquant / csc(中信建投) / cj(长江证券)
  api_url: ""
  account_id: ""
  password: ""
  ca_path: ""
  cert_path: ""
  is_demo: true
  comm_type: "http"     # http / tcp / dll
  app_key: ""           # 券商应用Key（中信建投/长江证券需要）
  app_secret: ""        # 券商应用Secret
  # ext_config:         # 扩展配置
  #   key1: value1

# ====== 中信建投配置示例 ======
# broker:
#   id: "csc_broker_01"
